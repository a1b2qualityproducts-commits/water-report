<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASE AQUAANSH - Premium Water Quality</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --safe-glow: #00e676;
      --unsafe-glow: #ff4b4b;
      --button-glow: #00c6ff;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(-45deg, #001f3f, #005c97, #36d1dc, #0052d4);
      background-size: 400% 400%;
      animation: waveFlow 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    @keyframes waveFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-dashboard {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      width: 90%;
      max-width: 420px;
      border-radius: 30px;
      padding: 40px 30px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.4);
      text-align: center;
      position: relative;
    }

    /* ENLARGED LOGO */
    .logo {
      width: 130px; 
      height: 130px;
      object-fit: contain;
      margin-bottom: 5px;
      filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      margin: 0 0 5px 0;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .tagline {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
      margin-bottom: 25px;
    }

    .date-badge {
      display: inline-block;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 30px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px;
      margin-bottom: 30px;
    }

    .metric-card {
      background: rgba(255, 255, 255, 0.08);
      padding: 22px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .metric-card:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-5px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .metric-title {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .metric-value {
      font-size: 26px;
      font-weight: 800;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .metric-unit {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 2px;
    }

    .status-section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 24px;
      padding: 25px 20px;
      margin-bottom: 25px;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
    }

    .status-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .status-badge {
      display: inline-block;
      padding: 12px 40px;
      border-radius: 50px;
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.3s ease;
    }

    .safe {
      background: rgba(0, 230, 118, 0.15);
      color: var(--safe-glow);
      border: 2px solid var(--safe-glow);
      box-shadow: 0 0 25px rgba(0, 230, 118, 0.5), inset 0 0 10px rgba(0, 230, 118, 0.3);
    }

    .unsafe {
      background: rgba(255, 75, 75, 0.15);
      color: var(--unsafe-glow);
      border: 2px solid var(--unsafe-glow);
      box-shadow: 0 0 25px rgba(255, 75, 75, 0.5), inset 0 0 10px rgba(255, 75, 75, 0.3);
    }

    .loading {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 2px solid rgba(255,255,255,0.4);
    }

    .action-btn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: var(--button-glow);
      box-shadow: 0 0 20px rgba(0, 198, 255, 0.4);
      transform: translateY(-2px);
    }

    .action-btn:active {
      transform: translateY(1px);
    }

    .footer {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .pulse {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>

<div class="glass-dashboard">
  
  <img src="https://github.com/a1b2qualityproducts-commits/water-report/blob/main/preview%20(2)-Photoroom.png?raw=true" class="logo" alt="ASE AQUAANSH Logo">

  <h1>ASE AQUAANSH</h1>
  <div class="tagline">Trust In Every Drop</div>

  <div class="date-badge">
    📅 <span id="date">Connecting to sensor...</span>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-title">TDS</div>
      <div class="metric-value" id="tds">--</div>
      <div class="metric-unit">ppm</div>
    </div>
    
    <div class="metric-card">
      <div class="metric-title">pH</div>
      <div class="metric-value" id="ph">--</div>
      <div class="metric-unit">level</div>
    </div>
  </div>

  <div class="status-section">
    <div class="status-label">Status</div>
    <div id="status-badge" class="status-badge loading pulse">Scanning...</div>
  </div>

  <button id="refreshBtn" class="action-btn">🔄 Refresh Data</button>

  <div class="footer">
    Live Data Synced: <span id="time">--:--</span>
  </div>

</div>

<script>
  // YOUR EXACT GOOGLE APPS SCRIPT URL
  const apiURL = "https://script.google.com/macros/s/AKfycbzcp8tMFVB7ppn9LtAz5W1jqhAV3hgwaqYVJt2-A2fRMDQJOOVvXwGcmmOSMCJzjAb0vw/exec";

  function fetchWaterData() {
    document.getElementById("status-badge").className = "status-badge loading pulse";
    document.getElementById("status-badge").innerText = "SCANNING...";
    document.getElementById("date").innerText = "Fetching latest...";
    document.getElementById("date").classList.add("pulse");
    
    fetch(apiURL + "?nocache=" + new Date().getTime())
      .then(res => res.json())
      .then(data => {
        if (!data.success) throw new Error("API Error");

        // Date Logic
        let cleanDate = "Unknown Date";
        if (data.date) {
          const dateObj = new Date(data.date);
          if (!isNaN(dateObj)) {
            cleanDate = new Intl.DateTimeFormat('en-IN', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            }).format(dateObj);
          } else {
            cleanDate = String(data.date).split(" ")[0]; 
          }
        }
        
        document.getElementById("date").classList.remove("pulse");
        document.getElementById("date").innerText = cleanDate;
        
        // Metrics Logic (Hardness Removed)
        document.getElementById("tds").innerText = (data.tds !== undefined && data.tds !== "") ? data.tds : "--";
        document.getElementById("ph").innerText = (data.ph !== undefined && data.ph !== "") ? data.ph : "--";

        // BULLETPROOF STATUS LOGIC
        const statusBadge = document.getElementById("status-badge");
        statusBadge.classList.remove("pulse", "loading");
        
        // Grab the status safely, checking for both "status" and "Status" 
        const rawStatus = data.status || data.Status || ""; 
        
        // Force it to string, convert entirely to lowercase, and remove ANY extra spaces
        const currentStatus = String(rawStatus).toLowerCase().trim();
        
        // EVALUATE: If exact word is "no" -> UNSAFE. Everything else -> SAFE.
        if (currentStatus === "no") {
          statusBadge.innerText = "UNSAFE";
          statusBadge.className = "status-badge unsafe";
        } else {
          statusBadge.innerText = "SAFE";
          statusBadge.className = "status-badge safe";
        }

        // Time Update
        const now = new Date();
        document.getElementById("time").innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      })
      .catch(error => {
        document.getElementById("date").innerText = "Connection Failed";
        document.getElementById("date").classList.remove("pulse");
        
        const statusBadge = document.getElementById("status-badge");
        statusBadge.innerText = "NO DATA";
        statusBadge.className = "status-badge unsafe";
        statusBadge.classList.remove("pulse", "loading");
      });
  }

  fetchWaterData();
  document.getElementById("refreshBtn").addEventListener("click", fetchWaterData);

</script>

</body>
</html>
