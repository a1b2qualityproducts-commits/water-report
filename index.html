<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASE AQUAANSH - Water Quality Report</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0077ff, #00c6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  width: 90%;
  max-width: 380px;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.logo {
  width: 70px;
  margin-bottom: 10px;
}

h1 {
  color: #0077ff;
  margin: 5px 0;
}

.tagline {
  font-size: 12px;
  color: #777;
  margin-bottom: 15px;
}

.date {
  font-size: 14px;
  margin-bottom: 15px;
  color: #444;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  background: #0077ff;
  color: white;
  padding: 10px;
}

.table td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  font-weight: 500;
}

.status {
  margin-top: 15px;
  font-size: 16px;
  font-weight: bold;
}

.safe {
  color: green;
}

.unsafe {
  color: red;
}

.footer {
  font-size: 11px;
  color: #999;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <img src="https://github.com/a1b2qualityproducts-commits/water-report/blob/main/preview%20(2)-Photoroom.png?raw=true" class="logo" alt="ASE AQUAANSH Logo">

  <h1>ASE AQUAANSH</h1>
  <div class="tagline">TRUST IN EVERY DROP</div>

  <div class="date">
    📅 Report Date: <span id="date">Loading...</span>
  </div>

  <table class="table">
    <tr>
      <th>TDS</th>
      <th>pH</th>
      <th>Hardness</th>
    </tr>
    <tr>
      <td id="tds">Loading...</td>
      <td id="ph">Loading...</td>
      <td id="hardness">Loading...</td>
    </tr>
  </table>

  <div class="status">
    Bacteria Status:
    <span id="status">Loading...</span>
  </div>

  <div class="footer">
    Last Checked: <span id="time"></span>
  </div>

</div>

<script>
// 👇 PASTE YOUR NEW WEB APP URL HERE 👇
const apiURL = "YOUR_NEW_WEB_APP_URL_GOES_HERE";

fetch(apiURL)
  .then(res => res.json()) // We can use .json() directly now that the Apps Script is safer
  .then(data => {
    console.log("Data received from Google Sheets:", data);

    if (!data.success) {
      throw new Error(data.error || "Unknown error from Google Script");
    }

    // Populate the HTML with the data
    document.getElementById("tds").innerHTML = data.tds + " ppm";
    document.getElementById("ph").innerHTML = data.ph;
    document.getElementById("hardness").innerHTML = data.hardness + " ppm";
    document.getElementById("status").innerHTML = data.status;
    document.getElementById("date").innerHTML = data.date;

    // Handle status color styling safely
    const statusEl = document.getElementById("status");
    if (data.status && String(data.status).toLowerCase().trim() === "yes") {
      statusEl.innerHTML = "Safe";
      statusEl.classList.add("safe");
      statusEl.classList.remove("unsafe");
    } else {
      statusEl.innerHTML = "Unsafe / No";
      statusEl.classList.add("unsafe");
      statusEl.classList.remove("safe");
    }
  })
  .catch((err) => {
    console.error("Fetch Error:", err);

    // Fallback UI if something breaks
    document.getElementById("tds").innerHTML = "--";
    document.getElementById("ph").innerHTML = "--";
    document.getElementById("hardness").innerHTML = "--";
    document.getElementById("status").innerHTML = "Error loading data";
    document.getElementById("status").classList.add("unsafe");
    document.getElementById("date").innerHTML = "No Data";
  });

// Set current time
const now = new Date();
document.getElementById("time").innerHTML = now.toLocaleTimeString();

</script>

</body>
</html>
